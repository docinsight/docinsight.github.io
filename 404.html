<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Not found - DocInsight Samples</title>
    <meta name="robots" content="noindex,follow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0c0f" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg: #fafafa;
        --paper: #ffffff;
        --surface: #ffffff;
        --ink: #171717;
        --ink-70: rgba(23, 23, 23, 0.7);
        --ink-50: rgba(23, 23, 23, 0.5);
        --border: #e5e5e5;
        --border-strong: rgba(23, 23, 23, 0.2);
        --accent: #0ea5e9;
        --btn-bg: #171717;
        --btn-text: #ffffff;
        color-scheme: light;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0c0f;
          --paper: #101114;
          --surface: #15171b;
          --ink: #ededed;
          --ink-70: rgba(255, 255, 255, 0.7);
          --ink-50: rgba(255, 255, 255, 0.5);
          --border: rgba(255, 255, 255, 0.1);
          --border-strong: rgba(255, 255, 255, 0.3);
          --accent: #38bdf8;
          --btn-bg: #ffffff;
          --btn-text: #000000;
          color-scheme: dark;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      a {
        color: inherit;
      }

      .header {
        border-bottom: 1px solid var(--border);
        background: color-mix(in srgb, var(--paper) 88%, transparent);
        backdrop-filter: blur(10px);
      }

      .header-inner,
      .page {
        width: min(100% - 48px, 960px);
        margin: 0 auto;
      }

      .header-inner {
        display: flex;
        align-items: center;
        height: 64px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .mark {
        width: 28px;
        height: 28px;
        flex: none;
      }

      .page {
        display: grid;
        align-content: start;
        min-height: calc(100vh - 65px);
        padding: 72px 0;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--ink-50);
        font-family:
          "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
          Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(44px, 8vw, 76px);
        line-height: 0.95;
        letter-spacing: -0.055em;
      }

      .lead {
        max-width: 600px;
        margin: 24px 0 0;
        color: var(--ink-70);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--paper);
        color: var(--ink);
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition:
          border-color 150ms ease,
          background-color 150ms ease;
      }

      .button:hover {
        border-color: var(--border-strong);
        background: var(--surface);
      }

      .button.primary {
        border-color: var(--btn-bg);
        background: var(--btn-bg);
        color: var(--btn-text);
      }

      @media (max-width: 560px) {
        .header-inner,
        .page {
          width: min(100% - 32px, 960px);
        }

        .page {
          padding: 56px 0;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a class="brand" href="https://docinsight.dev/">
          <svg class="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M23.75 10H16c-4 0-7 3-7 7v26c0 4 3 7 7 7h9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
            <path d="M40.25 10H48c4 0 7 3 7 7v26c0 4-3 7-7 7h-9" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
            <rect x="28.75" y="17.2" width="6.5" height="32.8" rx="3.25" fill="#06b6d4" />
            <circle cx="32" cy="11.6" r="5.1" fill="#06b6d4" />
          </svg>
          <span>DocInsight</span>
        </a>
      </div>
    </header>

    <main class="page">
      <p class="eyebrow">404 / GitHub Pages root</p>
      <h1>Page not found</h1>
      <p class="lead">
        This GitHub Pages root is used for DocInsight sample hosting. The page
        you requested is not published here.
      </p>

      <div class="actions">
        <a class="button primary" href="https://docinsight.dev/samples/">View samples</a>
        <a class="button" href="https://docinsight.dev/">DocInsight.dev</a>
      </div>
    </main>
  </body>
</html>
